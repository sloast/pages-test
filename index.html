<!DOCTYPE html>
<html lang="en" x-data="{ dark: false }" :class="{ 'dark': dark }">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiny Alpine + Tailwind Dark Mode</title>
  <script type="module" crossorigin src="/assets/index-BRkJ0KAZ.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BD3C-nEU.css">
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-6 transition-colors duration-300">

  <!-- Dark Mode Toggle -->
  <div class="max-w-sm mx-auto mb-6 flex justify-between items-center p-4 bg-white dark:bg-gray-800 rounded shadow">
    <h1 class="text-xl font-bold">Dark Mode Example</h1>
    <button @click="dark = !dark" class="px-4 py-2 bg-blue-500 text-white rounded">
      Toggle
    </button>
  </div>

  <!-- Counter Example -->
  <div x-data="counterComponent()" class="max-w-sm mx-auto p-4 bg-white dark:bg-gray-800 rounded shadow space-y-4">
    <h2 class="text-lg font-bold">Counter</h2>
    <p>Current count: <span x-text="count"></span></p>
    <div class="flex space-x-2">
      <button @click="increment()" class="px-4 py-2 bg-green-500 text-white rounded">+</button>
      <button @click="decrement()" class="px-4 py-2 bg-red-500 text-white rounded">-</button>
    </div>
  </div>

  <!-- Toggle Example -->
  <div x-data="{ open: false }" class="mt-6 max-w-sm mx-auto p-4 bg-white dark:bg-gray-800 rounded shadow">
    <button @click="open = !open" class="px-4 py-2 bg-indigo-500 text-white rounded">
      Toggle Details
    </button>
    <div x-show="open" x-transition class="mt-2 p-2 bg-gray-100 dark:bg-gray-700 rounded">
      <p>This content is hidden until you click the toggle button!</p>
    </div>
  </div>


  <script>
    // Alpine counter module
    function counterComponent() {
      return {
        count: 0,
        increment() { this.count++ },
        decrement() { this.count-- },
      }
    }
  </script>
</body>

</html>
